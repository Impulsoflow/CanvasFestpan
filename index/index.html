<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas de Melhorias - Festpan Alimentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Poppins', sans-serif; background: #f8f9fa; }
        .nav-tabs .nav-link { font-weight: 600; }
        .nav-tabs .nav-link.active { 
            color: #198754 !important; 
            border-bottom: 4px solid #198754; 
            background: white;
        }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        textarea.form-control, input.form-control {
            border: 2px dashed #adb5bd;
            transition: all 0.25s;
        }
        textarea.form-control:focus, input.form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25,135,84,0.15);
        }
        .canvas-block {
            min-height: 220px;
            padding: 1.25rem;
            border-radius: 12px;
            color: white;
            font-weight: 500;
        }
        .block-red    { background: #dc3545; }
        .block-blue   { background: #0d6efd; }
        .block-green  { background: #198754; }
        .block-yellow { background: #ffc107; color: #212529; }
        .role-emoji { font-size: 3.2rem; line-height: 1; }
        @media print {
            .nav-tabs, .btn, .no-print { display: none !important; }
            body { background: white; }
            .card, .canvas-block { border: 2px solid #666 !important; color: black !important; background: white !important; }
            textarea, input { border: 1px solid #333 !important; background: white !important; }
        }
    </style>
</head>
<body>

<div class="container-fluid bg-success text-white py-4 text-center shadow-sm">
    <h1 class="display-4 fw-bold mb-1">🍞 FESTPAN ALIMENTOS 🍞</h1>
    <h2 class="h3 mb-0">Canvas de Melhorias Contínuas – 1º Dia</h2>
</div>

<div class="container my-4">

    <!-- Abas dos grupos -->
    <ul class="nav nav-tabs justify-content-center mb-4 flex-wrap" id="group-tabs"></ul>

    <!-- Conteúdo -->
    <div class="tab-content" id="group-content"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const roles = [
        { emoji: "🔵", title: "Líder Facilitador",   nickname: "O Maestro" },
        { emoji: "⏱️", title: "Guardião do Tempo",   nickname: "O Cronometrista" },
        { emoji: "✍️", title: "Escriba Visual",      nickname: "O Sintetizador" },
        { emoji: "🧐", title: "Questionador Estratégico", nickname: "O Auditor da Realidade" },
        { emoji: "❤️", title: "Guardião da Empatia", nickname: "Defensor do Fator Humano / Qualidade" },
        { emoji: "🎤", title: "Porta-Voz",           nickname: "O Embaixador" }
    ];

    const tabsUl = document.getElementById("group-tabs");
    const contentDiv = document.getElementById("group-content");

    for (let g = 1; g <= 6; g++) {
        // TAB
        const tabLi = document.createElement("li");
        tabLi.className = "nav-item";
        tabLi.innerHTML = `
            <a class="nav-link ${g===1?'active':''}" id="tab-grupo${g}" 
               data-bs-toggle="tab" data-bs-target="#grupo${g}" href="#grupo${g}">
                Grupo ${g}
            </a>`;
        tabsUl.appendChild(tabLi);

        // PANE
        const pane = document.createElement("div");
        pane.className = `tab-pane fade ${g===1?'show active':''}`;
        pane.id = `grupo${g}`;

        let rolesHTML = roles.map(role => `
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <div class="role-emoji mb-2">${role.emoji}</div>
                        <h5 class="fw-bold mb-1">${role.title}</h5>
                        <p class="text-muted small mb-3">${role.nickname}</p>
                        
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Nome completo">
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Cargo na Festpan">
                        </div>
                        <div>
                            <textarea class="form-control" rows="3" placeholder="Responsabilidades no grupo..."></textarea>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');

        pane.innerHTML = `
            <div class="p-4 bg-white rounded-4 shadow">

                <!-- Nome editável do grupo -->
                <div class="text-center mb-4">
                    <input type="text" class="form-control form-control-lg text-center fw-bold fs-3" 
                           id="group-name-${g}" value="Grupo ${g} – Melhoria" 
                           placeholder="Digite o nome deste grupo (ex: Turno 1 – Envase)">
                </div>

                <!-- Papéis -->
                <h4 class="text-success mb-3 text-center">Funções Estratégicas do Grupo</h4>
                <div class="row g-3 mb-5">
                    ${rolesHTML}
                </div>

                <!-- Canvas principal – 4 blocos -->
                <h4 class="border-bottom pb-2 mb-4 text-success text-center">
                    Canvas da Melhoria – ${g}
                </h4>

                <div class="row g-3 mb-5">
                    <div class="col-md-6">
                        <div class="canvas-block block-red">
                            <h5 class="fw-bold mb-3">💡 1. O Foco (O Que Faço?)</h5>
                            <small class="d-block mb-2">Problema central / Ideia de Melhoria principal</small>
                            <textarea class="form-control bg-white text-dark" rows="8" placeholder="Ex: Lentidão no setup da máquina de envase → reduzir de 45 min para 18 min"></textarea>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="canvas-block block-blue">
                            <h5 class="fw-bold mb-3">2. Os Processos (Como Faço?)</h5>
                            <small>Atividades Principais • Recursos • Parceiros</small>
                            <textarea class="form-control bg-white text-dark mt-2" rows="8" placeholder="• Criar novo POP de setup rápido&#10;• Agendar 2h com manutenção&#10;• Envolver Compras para peças críticas"></textarea>
                        </div>

                        <div class="canvas-block block-green mt-3">
                            <h5 class="fw-bold mb-3">3. As Pessoas (Para Quem?)</h5>
                            <small>Clientes internos • Relacionamento • Engajamento</small>
                            <textarea class="form-control bg-white text-dark mt-2" rows="6" placeholder="• Beneficiados: operadores do turno B&#10;• Treinamento: 20 min na troca de turno&#10;• Resistência: medo de perder ritmo → comunicar ganhos de segurança"></textarea>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="canvas-block block-yellow">
                            <h5 class="fw-bold mb-3">4. O Balanço (Quanto?)</h5>
                            <div class="row">
                                <div class="col-md-6">
                                    <strong>Estrutura de Custos</strong><br>
                                    <textarea class="form-control bg-white text-dark mt-1" rows="4" placeholder="• 4h parada programada&#10;• 3 colaboradores em treinamento&#10;• R$ 1.200 em peças"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <strong>Fluxos de Economia / Ganhos</strong><br>
                                    <textarea class="form-control bg-white text-dark mt-1" rows="4" placeholder="• -27 min por setup → +1.200 kg/semana&#10;• Menos estresse e retrabalho&#10;• Redução estimada de 12% no desperdício"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Atividades (opcional – pode esconder se quiser usar só o canvas) -->
                <div class="mt-5 no-print">
                    <h5 class="text-success mb-3">Plano de Ação / Atividades (opcional)</h5>
                    <button onclick="addActivity(${g})" class="btn btn-outline-success btn-sm mb-3">
                        + Adicionar linha
                    </button>
                    <table class="table table-bordered table-sm" id="table-${g}">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Atividade</th>
                                <th>Quem</th>
                                <th>Quando</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-${g}"></tbody>
                    </table>
                </div>

            </div>
        `;

        contentDiv.appendChild(pane);
    }

    // Função para adicionar atividade
    window.addActivity = function(group) {
        const tbody = document.getElementById(`tbody-${group}`);
        const num = tbody.rows.length + 1;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="text-center">${num}</td>
            <td><input class="form-control form-control-sm" placeholder="Descrever tarefa"></td>
            <td><input class="form-control form-control-sm" placeholder="Nome / papel"></td>
            <td><input type="date" class="form-control form-control-sm"></td>
            <td><select class="form-select form-select-sm"><option>Pendente</option><option>Em andamento</option><option>Concluído</option></select></td>
        `;
        tbody.appendChild(tr);
    };

    // Adiciona 3 linhas iniciais em cada tabela (opcional)
    for (let g = 1; g <= 6; g++) {
        for (let i = 0; i < 3; i++) addActivity(g);
    }
</script>
</body>
</html>
